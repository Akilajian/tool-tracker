<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tool Tracker</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:500px;
    margin:auto;
    padding:20px;
}

h2{
    text-align:center;
}

select,button{
    width:100%;
    padding:15px;
    margin-top:10px;
    font-size:18px;
}

.card{
    background:#f4f4f4;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}

.success{
    background:#dff0d8;
    padding:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<h2>Tool Tracker</h2>

<div class="card">
    <strong>Asset:</strong>
    <span id="assetId">Loading...</span>
</div>

<select id="employee">
    <option>Loading Employees...</option>
</select>

<select id="action">
    <option value="Checkout">Checkout</option>
    <option value="Return">Return</option>
</select>

<button onclick="alert('Button works'); submitScan();">
Submit
</button>

<div id="message"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxmE2k7MmfSAGhV-j4i7WzDUZ7jhqYH2zqkUeAh3gHtN3zCWskGtNRw62fcWr9KvWuz/exec";

const params =
new URLSearchParams(window.location.search);

const assetId =
params.get("asset");

document.getElementById("assetId").innerText =
assetId || "Unknown";

async function loadEmployees(){

    const response =
        await fetch(API_URL);

    const data =
        await response.json();

    const select =
        document.getElementById("employee");

    select.innerHTML = "";

    data.employees.forEach(emp=>{

        const option =
            document.createElement("option");

        option.value = emp;
        option.textContent = emp;

        select.appendChild(option);

    });

}

async function submitScan(){

    const employee =
        document.getElementById("employee").value;

    const action =
        document.getElementById("action").value;

    navigator.geolocation.getCurrentPosition(
        async(position)=>{

            const gps =
                position.coords.latitude +
                "," +
                position.coords.longitude;

            const response =
                await fetch(API_URL,{
                    method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },
                    body:JSON.stringify({
                        employee,
                        assetId,
                        action,
                        gps
                    })
                });

            const result =
                await response.json();

            document.getElementById("message")
            .innerHTML =
            "<div class='success'>" +
            action +
            " successful<br><br>" +
            result.assetName +
            "</div>";

        });

}

loadEmployees();

</script>

</body>
</html>
